version: "3"

vars:
  APP: matcha
  OUT: dist/{{.APP}}

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Format source files
    cmds:
      - deno fmt

  lint:
    desc: Lint source files
    cmds:
      - deno lint

  check:
    desc: Type-check the CLI entrypoint
    cmds:
      - deno check src/main.ts

  test:
    desc: Run tests
    cmds:
      - deno test --allow-read --allow-write --allow-env=HOME,USERPROFILE

  run:
    desc: Run the CLI
    cmds:
      - deno run --allow-read --allow-write --allow-env=HOME,USERPROFILE src/main.ts {{.CLI_ARGS}}
  run-plan:
    desc: Run sample plan
    cmds:
      - deno run --allow-read --allow-write --allow-env=HOME,USERPROFILE src/main.ts plan

  run-map:
    desc: Run sample map
    cmds:
      - deno run --allow-read --allow-write --allow-env=HOME,USERPROFILE src/main.ts map

  build-client:
    desc: Build the self-contained Svelte client bundles
    dir: client
    cmds:
      - npm run build

  build:
    desc: Compile the CLI into an executable
    cmds:
      - mkdir -p dist
      - deno compile --allow-read --allow-write --allow-env=HOME,USERPROFILE --include plan.js --include plan.css --include plan-components.css --include map.js --include map.css --include themes --include llm_output_format.txt --include llm_uml_output_format.txt --output {{.OUT}} src/main.ts

  install:
    desc: Install the compiled CLI to ~/.local/bin
    deps:
      - build
    cmds:
      - mkdir -p ~/.local/bin
      - cp {{.OUT}} ~/.local/bin/{{.APP}}

  clean:
    desc: Remove build and coverage output
    cmds:
      - rm -rf dist coverage
