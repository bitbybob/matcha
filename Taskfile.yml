version: "3"

vars:
  APP: matcha
  OUT: dist/{{.APP}}

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Format source files
    cmds:
      - zig fmt src build.zig

  lint:
    desc: Lint source files
    cmds:
      - zig fmt --check src build.zig

  check:
    desc: Type-check the CLI entrypoint
    cmds:
      - zig build

  test:
    desc: Run tests
    cmds:
      - zig build test

  run:
    desc: Run the CLI
    cmds:
      - zig build run -- {{.CLI_ARGS}}
  run-plan:
    desc: Run sample plan
    cmds:
      - zig build run -- plan

  run-map:
    desc: Run sample map
    cmds:
      - zig build run -- map

  build-client:
    desc: Build the self-contained Svelte client bundles
    dir: client
    cmds:
      - npm run build

  build:
    desc: Compile the CLI executable into dist
    cmds:
      - mkdir -p dist
      - zig build release
      - cp -f zig-out/bin/matcha-release {{.OUT}}

  install:
    desc: Install the compiled CLI to ~/.local/bin
    deps:
      - build
    cmds:
      - mkdir -p ~/.local/bin
      - cp {{.OUT}} ~/.local/bin/{{.APP}}

  clean:
    desc: Remove build and coverage output
    cmds:
      - rm -rf dist coverage zig-out .zig-cache
